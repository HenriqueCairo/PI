<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleções</title>
    <link rel="stylesheet" href="./coleçoes.css">
    
</head>
<body>
    <main class="page">
    <section class="launch-section">
      <div class="launch-top">
        <p class="launch-label">Próximo lançamento</p>
        <h1 class="launch-title">DROP 01:</h1>
        <h2 class="launch-subtitle">OFF-GRID</h2>

        <div class="countdown" id="countdown">
          <div class="time-box">
            <span class="time-value" id="days">04</span>
            <span class="time-label">Dias</span>
          </div>

          <div class="time-box">
            <span class="time-value" id="hours">12</span>
            <span class="time-label">Horas</span>
          </div>

          <div class="time-box">
            <span class="time-value" id="minutes">45</span>
            <span class="time-label">Min</span>
          </div>

          <div class="time-box">
            <span class="time-value" id="seconds">09</span>
            <span class="time-label">Secs</span>
          </div>
        </div>
      </div>

      <div class="launch-bottom">
        <div class="product-card">
          <img
            src="/src/assets/image/coleçao.png"
            alt="Produto do drop"
          >
        </div>

        <div class="product-info">
          <h3>O Conceito</h3>
          <p>
            O OFF-GRID é um mergulho na textura brutalista da cidade. Criamos um
            fusão entre a estética utilitária das ruas e o acabamento premium.
          </p>

          <a href="#" class="cta-button">
            CONFERIR
            <span>→</span>
          </a>
        </div>
      </div>
    </section>
  </main>
<script src="./coleçoes.css"></script>
</body>
</html>
