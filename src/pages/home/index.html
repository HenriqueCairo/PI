<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="./home.css">
    <link rel="stylesheet" href="/src/components/header/header.css">
    <link rel="stylesheet" href="/src/components/footer/footer.css">
</head>
<body>
    <div id="header"></div>

    <main>
          <section class="banner">
        <video autoplay muted loop class="video-banner">
            <source src="src/bjordanss.mp4" type="video/mp4">
        </video>
    
        <div class="overlay"></div>
    
        <div class="texto-banner">
            <h1>Seu estilo fala antes de você.</h1>

            <button class="btn-banner">Explore seu estilo</button>
        </div>
    </section>
    <br>

    <section class="menu1">
        <div class="item">
          <img src="src/nikegreen.jpg" alt="Tênis">
          <div class="overlay">
            <h3>Tênis</h3>
            <span class="explorar">Explore →</span>
          </div>
        </div>
      
        <div class="item">
          <img src="src/brinco.jpg" alt="Acessórios">
          <div class="overlay">
            <h3>Acessórios</h3>
            <span class="explorar">Explore →</span>
          </div>
        </div>
      
        <div class="item">
          <img src="src/image 35.svg" alt="Roupas">
          <div class="overlay">
            <h3>Roupas</h3>
            <span class="explorar">Explore →</span>
          </div>
        </div>
      </section>

      <section class="menu2">

        <div class="topo">
          <div>
            <h3 class="drop">Drops Selecionados</h3>
            <h1 class="text_inspire">Inspire-se</h1>
          </div>
      
          <h3 class="text_conferir">CONFERIR →</h3>
        </div>
      
        <div class="grid">
          <div class="item2">
            <img src="src/calça.png" alt="Calça">
            <p class="desc"><strong>CALÇA CARGO OVERSIZED</strong></p>
          </div>
      
          <div class="item2">
            <img src="src/outfit.png" alt="Outfit">
            <p class="desc"><strong>CALÇA ALFAIATARIA</strong></p>
          </div>
      
          <div class="item2">
            <img src="src/oversized.png" alt="Roupa">
            <p class="desc"><strong>CONJUNTOS OVERSIZED's</strong></p>
          </div>
        </div>
      
      </section>


      
      <section class="menu3">

        <div class="topo2">
          <div>
            <h2 class="novidades">Novidades</h2>
            <h1 class="lancamentos">Últimos lançamentos</h1>
          </div>
      
          <h3 class="conferir2">CONFERIR →</h3>
        </div>
      
        <div class="grid2"> 
          <div class="item3">
            <img src="src/baseball.webp" alt="Outfit">
          </div>
      
          <div class="item3">
            <img src="src/kitfemale.jpeg" alt="Roupa">
          </div>
        </div>
      
      </section>

    </main>
   <div id="footer"></div>

<script src="/src/components/header/header.js"></script>
<script src="/src/components/footer/footer.js"></script>
<script src="./home.js"></script>
    
</body>
</html>
