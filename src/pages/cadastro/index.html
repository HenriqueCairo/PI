<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./cadastro.css">
   
</head>
<body>
 <main class="container">
    <section class="card">
      <h1>Junte-se a nós.</h1>
      <p class="subtitle">Crie uma conta para receber ofertas exclusivas</p>

      <form id="cadastroForm" class="form">
        <div class="row two-columns">
          <input type="text" id="nome" placeholder="Nome">
          <input type="text" id="sobrenome" placeholder="Sobrenome">
        </div>

        <div class="label">Data de nascimento</div>
        <div class="row three-columns">
          <input type="text" id="dia" placeholder="Dia" maxlength="2">
          <input type="text" id="mes" placeholder="Mês" maxlength="2">
          <input type="text" id="ano" placeholder="Ano" maxlength="4">
        </div>

        <div class="row sexo-cpf">
          <div class="sexo-box">
            <div class="label">Sexo</div>
            <div class="radio-group">
              <label><input type="radio" name="sexo" value="Masculino"> Masculino</label>
              <label><input type="radio" name="sexo" value="Feminino"> Feminino</label>
            </div>
          </div>

          <div class="cpf-box">
            <div class="label">CPF</div>
            <input type="text" id="cpf" placeholder="00000000000" maxlength="11">
          </div>
        </div>

        <input type="text" id="telefone" placeholder="Telefone: (xx) 0 0000 - 0000">
        <input type="email" id="email" placeholder="ENDEREÇO DE E-MAIL">
        <input type="password" id="senha" placeholder="SENHA">

        <button type="submit" class="btn-primary">Criar Conta</button>
      </form>

      <div class="bottom-text">
        <p>Já tem uma conta?</p>
        <a href="#">Entrar</a>
      </div>
    </section>
  </main>
<script src="./cadastro.js" ></script>
    
</body>
</html>
